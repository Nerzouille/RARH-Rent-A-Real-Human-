services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: humanproof
      POSTGRES_PASSWORD: humanproof
      POSTGRES_DB: humanproof
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U humanproof"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
